<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Nexus Digital Marketing</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#4f46e5', secondary: '#ec4899', dark: '#0f172a', light: '#f8fafc' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
</head>

<body
    class="bg-slate-900 text-slate-300 antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Decorative Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-[10%] left-[10%] w-[60%] h-[60%] bg-indigo-600 rounded-full mix-blend-screen filter blur-[120px] opacity-30">
        </div>
        <div
            class="absolute bottom-[10%] right-[10%] w-[60%] h-[60%] bg-pink-600 rounded-full mix-blend-screen filter blur-[120px] opacity-30">
        </div>
    </div>

    <!-- Pattern Overlay -->
    <div class="absolute inset-0 z-0 opacity-10"
        style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 24px 24px;"></div>

    <div class="text-center relative z-10 max-w-2xl px-4">
        <div class="inline-flex items-center gap-2 mb-8 group">
            <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center text-white font-bold text-2xl shadow-lg ring-4 ring-white/10">
                N</div>
            <span class="text-2xl font-bold tracking-tight text-white">Nexus<span
                    class="text-indigo-400">.</span></span>
        </div>

        <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 leading-tight">We're launching something <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400">amazing</span></h1>

        <p class="text-lg md:text-xl text-slate-400 mb-10 max-w-xl mx-auto">Get ready for a new era of digital
            marketing. Leave your email below to get notified when we go live and receive early access.</p>

        <!-- Countdown (Static implementation for template) -->
        <div class="flex justify-center gap-4 md:gap-8 mb-12">
            <div class="text-center">
                <div
                    class="w-16 h-16 md:w-20 md:h-20 bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center mb-2">
                    <span class="text-2xl md:text-3xl font-bold text-white">14</span>
                </div>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Days</span>
            </div>
            <div class="text-center">
                <div
                    class="w-16 h-16 md:w-20 md:h-20 bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center mb-2">
                    <span class="text-2xl md:text-3xl font-bold text-white">08</span>
                </div>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Hours</span>
            </div>
            <div class="text-center">
                <div
                    class="w-16 h-16 md:w-20 md:h-20 bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center mb-2">
                    <span class="text-2xl md:text-3xl font-bold text-white">45</span>
                </div>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Minutes</span>
            </div>
            <div class="text-center">
                <div
                    class="w-16 h-16 md:w-20 md:h-20 bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center mb-2">
                    <span class="text-2xl md:text-3xl font-bold text-white">12</span>
                </div>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Seconds</span>
            </div>
        </div>

        <!-- Subscription Form -->
        <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
            <input type="email" placeholder="Enter your email address" required
                class="flex-1 px-5 py-3.5 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500 transition-colors" />
            <button type="submit"
                class="px-6 py-3.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 transition-colors shadow-lg shadow-indigo-500/30 whitespace-nowrap">
                Notify Me
            </button>
        </form>
    </div>

    <!-- Social Links -->
    <div class="absolute bottom-8 left-0 w-full flex justify-center gap-6 z-10">

    </div>
