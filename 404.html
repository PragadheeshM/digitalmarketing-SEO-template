<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Nexus Digital Marketing</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#4f46e5', secondary: '#ec4899', dark: '#0f172a', light: '#f8fafc' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Decorative Elements -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div
            class="absolute top-[20%] left-[20%] w-[40%] h-[40%] bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50">

        <div
            class="absolute bottom-[20%] right-[20%] w-[40%] h-[40%] bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50">
        </div>
    </div>

    <div class="text-center relative z-10 max-w-lg">
        <h1 class="text-9xl font-black text-slate-900 tracking-tighter mb-4">4<span class="text-indigo-600">0</span>4
        </h1>
        <h2 class="text-3xl font-bold text-slate-800 mb-4">Page Not Found</h2>
        <p class="text-slate-500 mb-8 text-lg">Oops! The page you are looking for might have been removed, had its name
            changed, or is temporarily unavailable.</p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="index.html"
                class="px-8 py-3.5 bg-slate-900 text-white font-bold rounded-full hover:bg-indigo-600 transition-colors shadow-lg btn-hover w-full sm:w-auto">
                Go to Homepage
            </a>
            <a href="contact.html"
                class="px-8 py-3.5 bg-white text-slate-800 font-bold border border-slate-200 rounded-full hover:bg-slate-50 transition-colors w-full sm:w-auto">
                Contact Support
            </a>
        </div>
    </div>

</body>

</html>
